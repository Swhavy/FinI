<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Gold Gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2D06B" />
      <stop offset="40%" stop-color="#D6A338" />
      <stop offset="100%" stop-color="#9E6B1D" />
    </linearGradient>
    
    <!-- Green Gradient -->
    <linearGradient id="green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4C6853" />
      <stop offset="100%" stop-color="#18271E" />
    </linearGradient>

    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E2029" />
      <stop offset="100%" stop-color="#0A0B0F" />
    </linearGradient>

    <!-- 3D Depth Shadow Filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1.5" dy="2.5" stdDeviation="3" flood-color="#000" flood-opacity="0.8" />
    </filter>
  </defs>

  <!-- Background App Icon Base -->
  <rect width="200" height="200" rx="40" fill="url(#bg)" />

  <!-- Logo Elements Grouped with Drop Shadow -->
  <g filter="url(#shadow)">
    <!-- Left Dark Green Arc -->
    <path 
      d="M 84 47 A 55 55 0 0 0 84 153" 
      fill="none" 
      stroke="url(#green)" 
      stroke-width="20" 
      stroke-linecap="butt" 
    />

    <!-- Right Gold Arc -->
    <path 
      d="M 116 47 A 55 55 0 0 1 116 153" 
      fill="none" 
      stroke="url(#gold)" 
      stroke-width="20" 
      stroke-linecap="butt" 
    />

    <!-- Center 'i' Dot -->
    <circle cx="100" cy="73" r="10" fill="url(#gold)" />
    
    <!-- Center 'i' Stem -->
    <rect x="90" y="93" width="20" height="60" rx="3" fill="url(#gold)" />
  </g>
</svg>
